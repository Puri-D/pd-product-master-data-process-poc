stacking_limits:
  very_heavy:
    weight_per_carton_kg: ">15"
    max_pallets_high: 1
    restriction: "Bottom layer only"
    
  heavy:
    weight_per_carton_kg: "10-15"
    max_pallets_high: 3
    
  medium:
    weight_per_carton_kg: "5-10"
    max_pallets_high: 5
    
  light:
    weight_per_carton_kg: "2-5"
    max_pallets_high: 8
    
  very_light:
    weight_per_carton_kg: "<2"
    max_pallets_high: 10