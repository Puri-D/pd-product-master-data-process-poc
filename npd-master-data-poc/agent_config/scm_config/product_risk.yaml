risk_categories:
  high_risk:
    description: "Raw animal products"
    examples: ["Raw poultry"]
    inspection_frequency: "Every 4 hours"
    temp_tolerance: "±1°C max"
    
  medium_risk:
    description: "Raw products with moderate risk"
    examples: ["Raw pork cuts"]
    inspection_frequency: "Every 8 hours"
    temp_tolerance: "±2°C acceptable"
    
  low_risk:
    description: "Cooked or processed"
    examples: ["Cooked meat", "Vegetables"]
    inspection_frequency: "Daily"
    temp_tolerance: "±3°C acceptable"